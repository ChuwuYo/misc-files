[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.27"
evm_version = "cancun"     # Cancun 已支持 transient storage / mcopy；Prague 在 forge 1.0+ 也可选 "prague"
optimizer = true
optimizer_runs = 200

[fmt]
bracket_spacing = true
int_types = "long"
line_length = 110
multiline_func_header = "all"
quote_style = "double"
