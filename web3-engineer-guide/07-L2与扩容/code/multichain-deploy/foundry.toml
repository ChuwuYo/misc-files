[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = false
gas_reports = ["Counter"]

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC}"
op_sepolia = "${OP_SEPOLIA_RPC}"
base_sepolia = "${BASE_SEPOLIA_RPC}"
scroll_sepolia = "${SCROLL_SEPOLIA_RPC}"
zksync_sepolia = "${ZKSYNC_SEPOLIA_RPC}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
op_sepolia = { key = "${OP_ETHERSCAN_API_KEY}", url = "https://api-sepolia-optimistic.etherscan.io/api" }
base_sepolia = { key = "${BASE_ETHERSCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api" }
scroll_sepolia = { key = "${SCROLL_ETHERSCAN_API_KEY}", url = "https://api-sepolia.scrollscan.com/api" }
