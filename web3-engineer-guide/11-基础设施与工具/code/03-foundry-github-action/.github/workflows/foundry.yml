name: Foundry CI
permissions:
  contents: read
  pull-requests: write   # 评论 coverage 报告

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  build-and-test:
    name: forge build + test + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Show forge version
        run: forge --version

      - name: forge fmt --check
        run: forge fmt --check

      - name: forge build --sizes
        run: forge build --sizes

      - name: forge test
        run: forge test -vvv
        env:
          # mainnet fork URL, 用 GitHub secret 注入; 没设置则 fork 用例自动跳过
          FOUNDRY_ETH_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}

      - name: forge coverage (lcov)
        run: forge coverage --report lcov --report summary
        continue-on-error: true

      - name: Coverage threshold check (>= 80%)
        uses: zgosalvez/github-actions-report-lcov@v4
        with:
          coverage-files: lcov.info
          minimum-coverage: 80
          artifact-name: coverage-report
          github-token: ${{ secrets.GITHUB_TOKEN }}
          update-comment: true

  invariant-fuzz:
    name: forge test --match-test invariant (重型 fuzz)
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'pull_request'
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false
      - uses: foundry-rs/foundry-toolchain@v1

      - name: Heavy fuzz invariant
        run: forge test --match-test invariant -vvv
        env:
          # 单测 runs 提到 10000, depth 提到 50; 普通 PR 5000/25 即可
          FOUNDRY_INVARIANT_RUNS: "5000"
          FOUNDRY_INVARIANT_DEPTH: "25"
          FOUNDRY_FUZZ_RUNS: "10000"

  slither:
    name: Slither static analysis
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false
      - uses: foundry-rs/foundry-toolchain@v1
      - run: forge build --skip test

      - name: Slither
        uses: crytic/slither-action@v0.4.0
        with:
          fail-on: high
          slither-args: --filter-paths "lib|test"
