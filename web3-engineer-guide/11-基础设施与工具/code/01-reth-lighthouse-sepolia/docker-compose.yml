# reth + lighthouse 双客户端 Sepolia 同步
# 验证日期: 2026-04
# 镜像版本: ghcr.io/paradigmxyz/reth:v2.0.0 (2026-04 release),
#           sigp/lighthouse:v8.1.3 (2026-04, Fulu fork ready)
#
# 使用步骤:
#   1. mkdir -p ./jwt ./data/reth ./data/lighthouse
#   2. openssl rand -hex 32 | tr -d "\n" > ./jwt/jwt.hex
#   3. docker compose up -d
#   4. docker compose logs -f reth   # 观察 EL 同步
#   5. docker compose logs -f lighthouse  # 观察 CL 同步, checkpoint sync 通常 5-15 分钟达到 head
#
# 资源建议 (Sepolia testnet):
#   - 磁盘: 200 GB NVMe (Sepolia 全节点 ~150 GB, 留 30% buffer)
#   - 内存: 16 GB (reth 8 GB + lighthouse 4 GB + 系统 4 GB)
#   - 带宽: 50 Mbps 上下行
#
# 安全提示:
#   - 端口 8545 / 8546 仅绑定 127.0.0.1, 通过 nginx + auth 暴露给外部
#   - JWT 文件权限设为 600, 不要提交到 git

services:
  reth:
    image: ghcr.io/paradigmxyz/reth:v2.0.0
    container_name: reth-sepolia
    restart: unless-stopped
    stop_grace_period: 5m
    ports:
      - "127.0.0.1:8545:8545"   # HTTP RPC (本机)
      - "127.0.0.1:8546:8546"   # WS RPC (本机)
      - "30303:30303/tcp"       # P2P
      - "30303:30303/udp"       # P2P discovery
      - "127.0.0.1:9001:9001"   # Prometheus metrics
    volumes:
      - ./data/reth:/root/.local/share/reth
      - ./jwt:/root/jwt:ro
    command:
      - node
      - --chain=sepolia
      - --datadir=/root/.local/share/reth
      - --metrics=0.0.0.0:9001
      - --authrpc.addr=0.0.0.0
      - --authrpc.port=8551
      - --authrpc.jwtsecret=/root/jwt/jwt.hex
      - --http
      - --http.addr=0.0.0.0
      - --http.port=8545
      - --http.api=eth,net,web3,txpool,debug,trace
      - --http.corsdomain=*
      - --ws
      - --ws.addr=0.0.0.0
      - --ws.port=8546
      - --ws.api=eth,net,web3
      - --ws.origins=*
      - --port=30303
      - --discovery.port=30303
      # storage v2 默认开启, 进一步减小磁盘占用
      - --engine.persistence-threshold=2
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8545"]
      interval: 30s
      timeout: 10s
      retries: 5

  lighthouse:
    image: sigp/lighthouse:v8.1.3
    container_name: lighthouse-sepolia
    restart: unless-stopped
    depends_on:
      - reth
    ports:
      - "9000:9000/tcp"          # CL P2P
      - "9000:9000/udp"          # CL P2P
      - "127.0.0.1:5052:5052"    # Beacon API
      - "127.0.0.1:5054:5054"    # Prometheus metrics
    volumes:
      - ./data/lighthouse:/root/.lighthouse
      - ./jwt:/root/jwt:ro
    command:
      - lighthouse
      - bn
      - --network=sepolia
      - --datadir=/root/.lighthouse
      - --execution-endpoint=http://reth:8551
      - --execution-jwt=/root/jwt/jwt.hex
      - --checkpoint-sync-url=https://checkpoint-sync.sepolia.ethpandaops.io
      - --disable-deposit-contract-sync
      - --http
      - --http-address=0.0.0.0
      - --http-port=5052
      - --metrics
      - --metrics-address=0.0.0.0
      - --metrics-port=5054
      - --port=9000
      - --discovery-port=9000
      - --target-peers=80
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5052/eth/v1/node/health"]
      interval: 30s
      timeout: 10s
      retries: 5
