# nginx: 把 reth RPC 通过 HTTPS + basic auth + rate limit 暴露
# 生成 htpasswd: docker run --rm xmartlabs/htpasswd user pass > nginx/htpasswd
worker_processes auto;
events { worker_connections 4096; }

http {
    log_format json escape=json '{"time":"$time_iso8601","ip":"$remote_addr","method":"$request_method","uri":"$request_uri","status":$status,"bytes":$body_bytes_sent,"rt":$request_time}';
    access_log /var/log/nginx/access.log json;

    # IP 级 rate limit: 50 req/s, 突发 100
    limit_req_zone $binary_remote_addr zone=rpc_limit:10m rate=50r/s;

    upstream reth_http { server reth:8545; keepalive 64; }
    upstream reth_ws   { server reth:8546; keepalive 64; }

    server {
        listen 443 ssl http2;
        server_name rpc.example.com;
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # JSON-RPC HTTP
        location / {
            limit_req zone=rpc_limit burst=100 nodelay;
            auth_basic "RPC";
            auth_basic_user_file /etc/nginx/htpasswd;

            proxy_pass http://reth_http;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
            client_max_body_size 5m;     # 防止滥用 eth_call 上传大 calldata
        }

        # WebSocket
        location /ws {
            limit_req zone=rpc_limit burst=20 nodelay;
            auth_basic "RPC";
            auth_basic_user_file /etc/nginx/htpasswd;
            proxy_pass http://reth_ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
        }
    }
}
