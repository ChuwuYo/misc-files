[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.28"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = false
bytecode_hash = "none"
cbor_metadata = false

# 模糊测试默认参数
[fuzz]
runs = 256
max_test_rejects = 65536
seed = "0x3e8"

# 不变量测试默认参数
[invariant]
runs = 256
depth = 32
fail_on_revert = false
call_override = false
shrink_run_limit = 5000

# 远程 fork 测试 RPC
[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"

# Etherscan API 用于自动验证
[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }

# 格式化工具
[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
int_types = "long"
quote_style = "double"
number_underscore = "thousands"
