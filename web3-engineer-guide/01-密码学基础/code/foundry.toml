# Foundry 配置 — 用于编译 04_AirdropMerkle.sol
# 安装:
#   curl -L https://foundry.paradigm.xyz | bash && foundryup
#   forge install OpenZeppelin/openzeppelin-contracts@v5.6.1 --no-commit
# 编译:
#   forge build

[profile.default]
src = "."
out = "out"
libs = ["lib"]
solc = "0.8.28"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
]

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
