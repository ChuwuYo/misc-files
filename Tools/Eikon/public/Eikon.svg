<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- 底座遮罩 -->
    <mask id="carve-base">
      <rect width="200" height="200" fill="white" />
      <circle cx="180" cy="180" r="120" fill="black" />
      <circle cx="20" cy="80" r="40" fill="black" />
    </mask>
    <!-- 全局贯穿裂痕遮罩 -->
    <mask id="carve-global">
      <rect width="200" height="200" fill="white" />
      <line x1="20" y1="180" x2="180" y2="20" stroke="black" stroke-width="2.5" />
    </mask>
    <!-- favicon 用：跟随系统明暗（应用内主题由 TopNav 的 currentColor 控制） -->
    <style>
      svg { color: #04222a; }
      @media (prefers-color-scheme: dark) { svg { color: #ffffff; } }
    </style>
  </defs>

  <g mask="url(#carve-global)" fill="currentColor">
    <rect x="25" y="25" width="150" height="150" rx="35" mask="url(#carve-base)" />
    <circle cx="132" cy="132" r="15" />
    <circle cx="132" cy="132" r="30" fill="none" stroke="currentColor" stroke-width="1.5" />
  </g>
</svg>
